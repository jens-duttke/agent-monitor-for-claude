name: Close stale issues

on:
  schedule:
    - cron: '30 3 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days if there is no further activity.
          stale-pr-message: >
            This pull request has been inactive for 60 days and will be closed in 14 days if there is no further activity.
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
